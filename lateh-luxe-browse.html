<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Browse — Lateh Luxe Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="ll-core.js"></script>
<link rel="stylesheet" href="ll-theme.css"/>
<style>
/* ── SECTION CARDS (homepage of browse) ── */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.sec-card{background:var(--deep3);border:1px solid rgba(201,168,76,.12);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:transform .22s,border-color .22s,box-shadow .22s;}
.sec-card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.3);box-shadow:0 12px 40px rgba(0,0,0,.35);}
.sec-img{height:140px;background:var(--deep4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.sec-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.sec-img svg{width:42px;height:42px;color:rgba(201,168,76,.25);}
.sec-body{padding:16px;}
.sec-nm{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--ivory);}
.sec-desc{font-size:.72rem;color:var(--ivory-d);margin-top:4px;line-height:1.5;}
.sec-arrow{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:.66rem;letter-spacing:.1em;color:var(--gold-d);}
.sec-arrow svg{width:12px;height:12px;}
/* ── CATEGORY CARDS ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.cat-card{background:var(--deep3);border:1px solid rgba(201,168,76,.1);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s;}
.cat-card:hover{border-color:rgba(201,168,76,.28);transform:translateY(-2px);}
.cat-img{height:100px;background:var(--deep4);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cat-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.cat-img svg{width:28px;height:28px;color:rgba(201,168,76,.3);}
.cat-body{padding:10px 12px;}
.cat-nm{font-size:.82rem;color:var(--ivory-m);}
.cat-ct{font-size:.62rem;color:var(--ivory-d);margin-top:2px;}
/* ── ITEMS GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.prod-card{background:var(--deep3);border:1px solid rgba(201,168,76,.1);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;}
.prod-card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.25);box-shadow:0 8px 32px rgba(0,0,0,.3);}
.prod-img{height:160px;background:var(--deep4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.prod-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:3px;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;}
.prod-badge.new{background:rgba(90,142,201,.85);color:#fff;}
.prod-badge.sale{background:rgba(212,89,106,.85);color:#fff;}
.prod-badge.popular{background:rgba(201,168,76,.85);color:var(--deep);}
.prod-badge.exclusive{background:rgba(61,42,86,.92);color:var(--gold-l);border:1px solid rgba(201,168,76,.3);}
.prod-wl{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(10,10,15,.7);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;opacity:0;}
.prod-card:hover .prod-wl,.prod-wl.wishlisted{opacity:1;}
.prod-wl:hover{background:rgba(212,89,106,.3);}
.prod-wl svg{width:12px;height:12px;stroke:var(--ivory-m);}
.prod-wl.wishlisted svg{stroke:var(--err);fill:var(--err);}
.prod-info{padding:13px;}
.prod-cat{font-size:.58rem;letter-spacing:.12em;color:var(--gold-d);text-transform:uppercase;margin-bottom:3px;}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;color:var(--ivory);margin-bottom:6px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.prod-price{font-family:'Cinzel',serif;font-size:.84rem;color:var(--gold);}
.prod-old{font-size:.7rem;color:var(--ivory-d);text-decoration:line-through;margin-left:6px;}
.prod-foot{display:flex;gap:7px;padding:0 13px 13px;}
.prod-foot .btn{flex:1;padding:7px 8px;font-size:.6rem;letter-spacing:.1em;}
/* ── BOX SELECTION CARD ── */
.box-card{background:var(--deep3);border:1px solid rgba(201,168,76,.12);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .22s;}
.box-card:hover{border-color:rgba(201,168,76,.3);transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.3);}
.box-img{height:180px;background:var(--deep4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.box-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.box-img svg{width:48px;height:48px;color:rgba(201,168,76,.25);}
.box-info{padding:16px;}
.box-nm{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;color:var(--ivory);}
.box-price{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);margin-top:5px;}
.box-includes{font-size:.7rem;color:var(--ivory-d);margin-top:6px;line-height:1.6;}
.box-foot{display:flex;gap:8px;padding:0 16px 16px;}
/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.bc-item{font-size:.7rem;color:var(--ivory-d);cursor:pointer;transition:color .15s;}
.bc-item:hover{color:var(--gold);}
.bc-sep{font-size:.7rem;color:rgba(255,255,255,.2);}
.bc-current{font-size:.7rem;color:var(--gold-l);}
/* ── BACK BUTTON ── */
.back-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:transparent;border:1px solid rgba(201,168,76,.2);border-radius:var(--r);color:var(--ivory-d);font-size:.72rem;letter-spacing:.06em;cursor:pointer;transition:all .18s;font-family:'Raleway',sans-serif;margin-bottom:20px;width:fit-content;}
.back-btn:hover{border-color:rgba(201,168,76,.4);color:var(--gold);}
.back-btn svg{width:14px;height:14px;}
/* ── QUICK VIEW ── */
.qv-imgs{height:240px;background:var(--deep4);border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;}
.qv-imgs img{width:100%;height:100%;object-fit:contain;}
.qv-meta{display:flex;flex-direction:column;gap:10px;}
.qv-cat{font-size:.62rem;letter-spacing:.14em;color:var(--gold-d);text-transform:uppercase;}
.qv-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--ivory);}
.qv-price{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);}
.qv-desc{font-size:.78rem;color:var(--ivory-d);line-height:1.7;}
.qv-qty{display:flex;align-items:center;gap:10px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(201,168,76,.25);background:transparent;color:var(--ivory);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;line-height:1;}
.qty-btn:hover{border-color:var(--gold);color:var(--gold);}
.qty-val{font-family:'Cinzel',serif;font-size:.9rem;color:var(--ivory);min-width:20px;text-align:center;}
/* box detail modal */
.includes-list li{font-size:.76rem;color:var(--ivory-d);line-height:1.8;list-style:none;padding-left:14px;position:relative;}
.includes-list li::before{content:'✦';position:absolute;left:0;font-size:.5rem;color:var(--gold);top:3px;}
</style>
</head>
<body>
<div class="shell">
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo"><svg viewBox="0 0 32 32" fill="none"><rect x=".5" y=".5" width="31" height="31" stroke="#C9A84C" stroke-width=".7"/><rect x="4" y="4" width="24" height="24" stroke="#C9A84C" stroke-width=".3" stroke-dasharray="2 2"/><path d="M16 8l5 8-5 8-5-8z" stroke="#C9A84C" stroke-width=".8" fill="rgba(201,168,76,.15)"/><circle cx="16" cy="16" r="2" fill="#C9A84C"/></svg></div>
    <div><div class="sb-brand-name">Lateh <em>Luxe</em></div><div class="sb-brand-tag">Collections</div></div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sbAv">LL</div>
    <div class="sb-user-info"><div class="sb-name" id="sbName">Loading…</div><div class="sb-email" id="sbEmail"></div><div class="sb-tier" id="sbTier"></div></div>
  </div>
  <nav class="sb-nav">
    <a class="ni" href="lateh-luxe-dashboard.html"><span class="ni-ic" data-icon="dashboard"></span><span class="ni-lb">Dashboard</span></a>
    <a class="ni on" href="lateh-luxe-browse.html"><span class="ni-ic" data-icon="browse"></span><span class="ni-lb">Browse Catalogue</span></a>
    <a class="ni" href="lateh-luxe-cart.html"><span class="ni-ic" data-icon="cart"></span><span class="ni-lb">My Cart</span><span class="nbadge" id="cartB" style="display:none"></span></a>
    <a class="ni" href="lateh-luxe-wishlist.html"><span class="ni-ic" data-icon="wishlist"></span><span class="ni-lb">Wishlist</span><span class="nbadge" id="wlB" style="display:none"></span></a>
    <a class="ni" href="lateh-luxe-orders.html"><span class="ni-ic" data-icon="orders"></span><span class="ni-lb">My Orders</span></a>
    <a class="ni" href="lateh-luxe-notifications.html"><span class="ni-ic" data-icon="notifications"></span><span class="ni-lb">Notifications</span><span class="nbadge" id="notifB" style="display:none"></span></a>
    <a class="ni" href="lateh-luxe-support.html"><span class="ni-ic" data-icon="support"></span><span class="ni-lb">Support</span></a>
  </nav>
  <div class="sb-foot"><button class="sb-signout" onclick="LL.signOut()"><span class="sb-so-ic" data-icon="sign-out"></span>Sign Out</button></div>
</aside>
<div class="sb-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <button class="tb-menu" onclick="toggleSidebar()"><span data-icon="menu"></span></button>
    <div class="tb-title"><div class="tb-heading" id="tbTitle">Browse</div><div class="tb-sub" id="tbSub">Our Collections</div></div>
    <div class="tb-actions">
      <button class="tb-ic" onclick="location.href='lateh-luxe-cart.html'"><span data-icon="cart"></span><span class="tb-dot" id="cDot" style="display:none"></span></button>
      <button class="tb-ic" onclick="location.href='lateh-luxe-notifications.html'"><span data-icon="notifications"></span><span class="tb-dot" id="nDot" style="display:none"></span></button>
      <div class="tb-av" id="tbAv">LL</div>
    </div>
  </header>

  <div class="pg" id="mainPg">
    <div class="page-loader"><div class="spin"></div><p>Loading…</p></div>
  </div>
</div>
</div>

<!-- QUICK VIEW MODAL -->
<div class="modal-ov" id="qvModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-hd">
      <div class="modal-title" id="qvTitle">Product Details</div>
      <button class="modal-close" onclick="closeQV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="qv-imgs" id="qvImgs"></div>
      <div class="qv-meta">
        <div class="qv-cat" id="qvCat"></div>
        <div class="qv-name" id="qvName"></div>
        <div class="qv-price" id="qvPrice"></div>
        <div class="qv-desc" id="qvDesc"></div>
        <div class="qv-qty">
          <span style="font-size:.7rem;color:var(--ivory-d);">Quantity:</span>
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qvQty">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="qvAddWishlist()"><span data-icon="wishlist"></span>Wishlist</button>
      <button class="btn btn-gold" onclick="qvAddCart()"><span data-icon="cart"></span>Add to Cart</button>
    </div>
  </div>
</div>

<!-- CURATED BOX DETAIL MODAL -->
<div class="modal-ov" id="boxModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-hd">
      <div class="modal-title" id="bmTitle">Box Details</div>
      <button class="modal-close" onclick="closeBoxModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="bmBody"></div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeBoxModal()">Cancel</button>
      <button class="btn btn-gold" id="bmOrderBtn">Order This Box</button>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let sections=[], categories=[], items=[], curatedBoxes=[];
let view='sections';          // sections | categories | items | box-items
let activeSectionId=null, activeSectionSlug=null, activeSectionName='';
let activeCatId=null, activeCatName='';
let currentQVItem=null, qvQty=1, currentBox=null;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  LL.renderIcons();
  const auth = await LL.requireAuth('customer');
  if (!auth) return;
  LL.paintUser(auth.u);
  LL.watchAuth();
  await loadData();
  renderSections();
});

async function loadData() {
  const [secRes, catRes, itemRes, boxRes] = await Promise.all([
    LL.db.from('sections').select('*').eq('is_active', true).order('sort_order'),
    LL.db.from('categories').select('*').eq('is_active', true).order('sort_order'),
    LL.db.from('items').select('*').eq('is_active', true).order('created_at', {ascending:false}),
    LL.db.from('curated_boxes').select('*').eq('is_active', true).order('created_at', {ascending:false}),
  ]);
  sections = secRes.data || [];
  categories = catRes.data || [];
  items = itemRes.data || [];
  curatedBoxes = boxRes.data || [];
}

// ── BREADCRUMB ────────────────────────────────────────────────────────────────
function breadcrumb(parts) {
  return `<div class="breadcrumb">
    <span class="bc-item" onclick="renderSections()">Browse</span>
    ${parts.map((p,i) => i < parts.length-1
      ? `<span class="bc-sep">›</span><span class="bc-item" onclick="${p.fn}">${LL.esc(p.label)}</span>`
      : `<span class="bc-sep">›</span><span class="bc-current">${LL.esc(p.label)}</span>`
    ).join('')}
  </div>`;
}

function backBtn(label, fn) {
  return `<button class="back-btn" onclick="${fn}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to ${LL.esc(label)}
  </button>`;
}

// ── VIEW: SECTIONS ────────────────────────────────────────────────────────────
function renderSections() {
  view = 'sections';
  LL.setTxt('tbTitle', 'Browse');
  LL.setTxt('tbSub', 'Our Collections');
  if (!sections.length) {
    document.getElementById('mainPg').innerHTML = `<div class="empty"><div class="empty-ic"><span data-icon="browse"></span></div><div class="empty-title">No sections yet</div><div class="empty-sub">The admin is still setting up the catalogue.</div></div>`;
    LL.renderIcons(); return;
  }
  document.getElementById('mainPg').innerHTML = `
    <div class="sec-hd" style="margin-bottom:22px;">
      <div class="sec-title">Our <em>Collections</em></div>
      <div class="sec-sub">Choose a collection to explore</div>
    </div>
    <div class="sec-grid">
      ${sections.map(s => `
        <div class="sec-card" onclick="goSection('${s.id}','${LL.esc(s.slug||'')}','${LL.esc(s.name)}')">
          <div class="sec-img">
            ${s.cover_url ? `<img src="${LL.esc(s.cover_url)}" alt="${LL.esc(s.name)}" loading="lazy"/>` : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>'}
          </div>
          <div class="sec-body">
            <div class="sec-nm">${LL.esc(s.name)}</div>
            <div class="sec-desc">${LL.esc(s.description||'')}</div>
            <div class="sec-arrow">Explore <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
          </div>
        </div>`).join('')}
    </div>`;
  LL.renderIcons();
}

// ── VIEW: CATEGORIES in a section ────────────────────────────────────────────
function goSection(id, slug, name) {
  activeSectionId = id; activeSectionSlug = slug; activeSectionName = name;
  const isCurated = slug === 'curated-boxes';
  const isCurate  = slug === 'curate-your-own';
  view = 'categories';
  LL.setTxt('tbTitle', name); LL.setTxt('tbSub', '');
  const cats = categories.filter(c => c.section_id === id);
  if (!cats.length) {
    document.getElementById('mainPg').innerHTML = backBtn('Browse','renderSections()') + `<div class="empty"><div class="empty-ic"><span data-icon="browse"></span></div><div class="empty-title">No categories yet</div><div class="empty-sub">Check back soon.</div></div>`;
    LL.renderIcons(); return;
  }
  // Get item counts per category
  const countMap = {};
  items.forEach(i => { if(i.category_id) countMap[i.category_id] = (countMap[i.category_id]||0)+1; });
  if (isCurated) { curatedBoxes.forEach(b => { if(b.category_id) countMap[b.category_id] = (countMap[b.category_id]||0)+1; }); }

  document.getElementById('mainPg').innerHTML = `
    ${breadcrumb([{label: name}])}
    ${backBtn('Browse','renderSections()')}
    ${isCurate ? `<div class="card card-pad" style="margin-bottom:20px;background:rgba(201,168,76,.05);border-color:rgba(201,168,76,.2);">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span data-icon="gift"></span></div>
        <div><div style="font-size:.84rem;color:var(--ivory-m);font-weight:500;">Build Your Own Box</div>
        <div style="font-size:.72rem;color:var(--ivory-d);margin-top:2px;">Pick a category, choose items, then personalise your box before checkout.</div></div>
      </div>
    </div>` : ''}
    <div class="cat-grid">
      ${cats.map(c => `
        <div class="cat-card" onclick="goCategory('${c.id}','${LL.esc(c.name)}','${isCurated?'curated':'items'}')">
          <div class="cat-img">
            ${c.cover_url ? `<img src="${LL.esc(c.cover_url)}" alt="${LL.esc(c.name)}" loading="lazy"/>` : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>'}
          </div>
          <div class="cat-body">
            <div class="cat-nm">${LL.esc(c.name)}</div>
            <div class="cat-ct">${countMap[c.id]||0} item${(countMap[c.id]||0)!==1?'s':''}</div>
          </div>
        </div>`).join('')}
    </div>`;
  LL.renderIcons();
}

// ── VIEW: ITEMS in category ────────────────────────────────────────────────
function goCategory(catId, catName, mode) {
  activeCatId = catId; activeCatName = catName;
  view = mode === 'curated' ? 'curated' : 'items';
  LL.setTxt('tbTitle', catName); LL.setTxt('tbSub', activeSectionName);

  if (mode === 'curated') renderCuratedBoxes(catId, catName);
  else renderItemsGrid(catId, catName);
}

function renderCuratedBoxes(catId, catName) {
  const boxes = curatedBoxes.filter(b => b.category_id === catId);
  document.getElementById('mainPg').innerHTML = `
    ${breadcrumb([{label:activeSectionName,fn:`goSection('${activeSectionId}','${activeSectionSlug}','${LL.esc(activeSectionName)}')`},{label:catName}])}
    ${backBtn(activeSectionName,`goSection('${activeSectionId}','${activeSectionSlug}','${LL.esc(activeSectionName)}')`)}
    ${!boxes.length ? `<div class="empty"><div class="empty-ic"><span data-icon="gift"></span></div><div class="empty-title">No boxes in this category yet</div></div>` : `
    <div class="sec-grid">
      ${boxes.map(b => {
        const inc = Array.isArray(b.includes) ? b.includes : [];
        return `<div class="box-card" onclick="openBoxModal('${b.id}')">
          <div class="box-img">
            ${b.image_url ? `<img src="${LL.esc(b.image_url)}" alt="${LL.esc(b.name)}" loading="lazy"/>` : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>'}
            ${b.badge ? `<span class="prod-badge ${b.badge}" style="left:8px;top:8px;">${b.badge}</span>` : ''}
          </div>
          <div class="box-info">
            <div class="box-nm">${LL.esc(b.name)}</div>
            <div class="box-price">₦${LL.fmt(b.price)}</div>
            ${inc.length ? `<div class="box-includes">Includes: ${inc.slice(0,3).map(LL.esc).join(', ')}${inc.length>3?' +more':''}</div>` : ''}
          </div>
          <div class="box-foot">
            <button class="btn btn-gold" style="flex:1;" onclick="event.stopPropagation();openBoxModal('${b.id}')"><span data-icon="gift"></span>Order This Box</button>
          </div>
        </div>`;
      }).join('')}
    </div>`}`;
  LL.renderIcons();
}

function renderItemsGrid(catId, catName) {
  const catItems = items.filter(i => i.category_id === catId);
  const wl = LL.getLocal('ll_wishlist') || [];
  const wlIds = new Set(wl.map(w => w.id));
  document.getElementById('mainPg').innerHTML = `
    ${breadcrumb([{label:activeSectionName,fn:`goSection('${activeSectionId}','${activeSectionSlug}','${LL.esc(activeSectionName)}')`},{label:catName}])}
    ${backBtn(activeSectionName,`goSection('${activeSectionId}','${activeSectionSlug}','${LL.esc(activeSectionName)}')`)}
    ${activeSectionSlug === 'curate-your-own' ? `
      <div class="card card-pad" style="margin-bottom:18px;background:rgba(201,168,76,.04);border-color:rgba(201,168,76,.15);">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <div><div style="font-size:.82rem;color:var(--ivory-m);">Adding items to your custom box</div>
          <div style="font-size:.7rem;color:var(--ivory-d);margin-top:2px;">Add individual items to your cart, then checkout to finalise your box with a name and message.</div></div>
          <button class="btn btn-gold btn-sm" onclick="location.href='lateh-luxe-cart.html'"><span data-icon="cart"></span>View Box (<span id="cartCount">0</span>)</button>
        </div>
      </div>` : ''}
    ${!catItems.length ? `<div class="empty"><div class="empty-ic"><span data-icon="browse"></span></div><div class="empty-title">No items in this category yet</div><div class="empty-sub">The admin hasn't added items here yet. Check back soon.</div></div>` : `
    <div class="prod-grid">
      ${catItems.map(p => {
        const inWl = wlIds.has(p.id);
        return `<div class="prod-card">
          <div class="prod-img" onclick="openQV('${p.id}')">
            ${p.image_url ? `<img src="${LL.esc(p.image_url)}" alt="${LL.esc(p.name)}" loading="lazy"/>` : '<svg viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,.3)" stroke-width="1.2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/></svg>'}
            ${p.badge ? `<span class="prod-badge ${p.badge}">${p.badge}</span>` : ''}
            ${!p.in_stock ? '<span class="prod-badge sale">Out of Stock</span>' : ''}
            <button class="prod-wl ${inWl?'wishlisted':''}" onclick="toggleWishlist(event,'${p.id}')">
              <svg viewBox="0 0 24 24" fill="${inWl?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            </button>
          </div>
          <div class="prod-info" onclick="openQV('${p.id}')">
            <div class="prod-cat">${LL.esc(catName)}</div>
            <div class="prod-name">${LL.esc(p.name)}</div>
            <div><span class="prod-price">₦${LL.fmt(p.price)}</span>${p.original_price?`<span class="prod-old">₦${LL.fmt(p.original_price)}</span>`:''}</div>
          </div>
          <div class="prod-foot">
            <button class="btn btn-outline" onclick="toggleWishlist(event,'${p.id}')"><span data-icon="wishlist"></span></button>
            <button class="btn btn-gold" onclick="addToCartDirect(event,'${p.id}')" ${!p.in_stock?'disabled':''}>Add to Cart</button>
          </div>
        </div>`;
      }).join('')}
    </div>`}`;
  // Update cart count chip
  const cc = document.getElementById('cartCount');
  if (cc) cc.textContent = LL.getCart().reduce((s,c)=>s+(c.qty||1),0);
  LL.renderIcons();
}

// ── ITEM QUICK VIEW ───────────────────────────────────────────────────────────
function openQV(id) {
  const p = items.find(i => i.id === id); if (!p) return;
  currentQVItem = p; qvQty = 1;
  LL.setTxt('qvTitle', p.name); LL.setTxt('qvCat', activeCatName); LL.setTxt('qvName', p.name);
  document.getElementById('qvPrice').textContent = '₦' + LL.fmt(p.price) + (p.original_price ? ' (was ₦' + LL.fmt(p.original_price) + ')' : '');
  LL.setTxt('qvDesc', p.description || 'A premium Lateh Luxe item.');
  LL.setTxt('qvQty', '1');
  document.getElementById('qvImgs').innerHTML = p.image_url
    ? `<img src="${LL.esc(p.image_url)}" alt="${LL.esc(p.name)}"/>`
    : '<svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="rgba(201,168,76,.3)" stroke-width="1"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/></svg>';
  document.getElementById('qvModal').classList.add('show');
  LL.renderIcons();
}
function closeQV() { document.getElementById('qvModal').classList.remove('show'); }
window.addEventListener('keydown', e => { if (e.key === 'Escape') { closeQV(); closeBoxModal(); } });
function changeQty(d) { qvQty = Math.max(1, Math.min(99, qvQty + d)); LL.setTxt('qvQty', qvQty); }
function qvAddCart() { if (!currentQVItem) return; addToCartItem(currentQVItem, qvQty); closeQV(); }
function qvAddWishlist() { if (!currentQVItem) return; toggleWishlistItem(currentQVItem); closeQV(); }
function addToCartDirect(e, id) { e.stopPropagation(); const p = items.find(i => i.id === id); if (p) addToCartItem(p, 1); }

function addToCartItem(p, qty) {
  const cart = LL.getCart();
  const ex = cart.find(c => c.id === p.id);
  if (ex) ex.qty = (ex.qty || 1) + qty;
  else cart.push({ id: p.id, name: p.name, price: p.price, image: p.image_url || null, category: activeCatName, qty });
  LL.saveCart(cart); LL.syncBadges();
  LL.toast(`${p.name} added to cart`, 'success');
  const cc = document.getElementById('cartCount');
  if (cc) cc.textContent = cart.reduce((s,c)=>s+(c.qty||1),0);
}

function toggleWishlist(e, id) { e.stopPropagation(); const p = items.find(i => i.id === id); if (p) toggleWishlistItem(p); }
function toggleWishlistItem(p) {
  let wl = LL.getLocal('ll_wishlist') || [];
  const idx = wl.findIndex(w => w.id === p.id);
  if (idx >= 0) { wl.splice(idx, 1); LL.toast('Removed from wishlist', 'info'); }
  else { wl.push({ id: p.id, name: p.name, price: p.price, image: p.image_url || null, category: activeCatName }); LL.toast('Added to wishlist', 'success'); }
  LL.setLocal('ll_wishlist', wl);
  renderItemsGrid(activeCatId, activeCatName);
}

// ── CURATED BOX MODAL ─────────────────────────────────────────────────────────
function openBoxModal(id) {
  const b = curatedBoxes.find(x => x.id === id); if (!b) return;
  currentBox = b;
  LL.setTxt('bmTitle', b.name);
  const inc = Array.isArray(b.includes) ? b.includes : [];
  document.getElementById('bmBody').innerHTML = `
    <div style="height:200px;background:var(--deep4);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
      ${b.image_url ? `<img src="${LL.esc(b.image_url)}" style="width:100%;height:100%;object-fit:cover;" alt="${LL.esc(b.name)}"/>` : '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,.25)" stroke-width="1"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>'}
    </div>
    <div style="font-family:'Cinzel',serif;font-size:1.15rem;color:var(--gold);margin-bottom:6px;">₦${LL.fmt(b.price)}</div>
    ${b.description ? `<p style="font-size:.78rem;color:var(--ivory-d);line-height:1.7;margin-bottom:14px;">${LL.esc(b.description)}</p>` : ''}
    ${inc.length ? `<div style="font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px;">What's Inside</div>
    <ul class="includes-list">${inc.map(i => `<li>${LL.esc(i)}</li>`).join('')}</ul>` : ''}
  `;
  document.getElementById('bmOrderBtn').onclick = () => { orderCuratedBox(b); };
  document.getElementById('boxModal').classList.add('show');
  LL.renderIcons();
}
function closeBoxModal() { document.getElementById('boxModal').classList.remove('show'); }

function orderCuratedBox(b) {
  const cart = LL.getCart();
  cart.push({ id: b.id, name: b.name, price: b.price, image: b.image_url || null, category: 'Curated Box', qty: 1, type: 'curated_box' });
  LL.saveCart(cart); LL.syncBadges();
  LL.toast(`${b.name} added to cart`, 'success');
  closeBoxModal();
  setTimeout(() => location.href = 'lateh-luxe-cart.html', 700);
}
</script>
</body>
