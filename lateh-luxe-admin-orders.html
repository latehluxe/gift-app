<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Orders — Lateh Luxe Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="ll-core.js"></script>
<link rel="stylesheet" href="ll-theme.css"/>
</head>
<body>
<div class="shell">
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo"><svg viewBox="0 0 32 32" fill="none"><rect x=".5" y=".5" width="31" height="31" stroke="#C9A84C" stroke-width=".7"/><rect x="4" y="4" width="24" height="24" stroke="#C9A84C" stroke-width=".3" stroke-dasharray="2 2"/><path d="M16 8l5 8-5 8-5-8z" stroke="#C9A84C" stroke-width=".8" fill="rgba(201,168,76,.15)"/><circle cx="16" cy="16" r="2" fill="#C9A84C"/></svg></div>
    <div><div class="sb-brand-name">Lateh <em>Luxe</em></div><div class="sb-brand-tag">Admin Panel</div></div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sbAv">AD</div>
    <div class="sb-user-info"><div class="sb-name" id="sbName">Administrator</div><div class="sb-email" id="sbEmail"></div><div class="sb-tier" id="sbTier">Admin</div></div>
  </div>
  <nav class="sb-nav">
    <a class="ni" href="lateh-luxe-admin.html"><span class="ni-ic" data-icon="dashboard"></span><span class="ni-lb">Dashboard</span></a>
    <a class="ni" href="lateh-luxe-admin-products.html"><span class="ni-ic" data-icon="products"></span><span class="ni-lb">Products</span></a>
    <a class="ni" href="lateh-luxe-admin-inventory.html"><span class="ni-ic" data-icon="inventory"></span><span class="ni-lb">Inventory</span></a>
    <a class="ni on" href="lateh-luxe-admin-orders.html"><span class="ni-ic" data-icon="orders"></span><span class="ni-lb">Orders</span></a>
    <a class="ni" href="lateh-luxe-admin-customers.html"><span class="ni-ic" data-icon="customers"></span><span class="ni-lb">Customers</span></a>
    <a class="ni" href="lateh-luxe-admin-reviews.html"><span class="ni-ic" data-icon="reviews"></span><span class="ni-lb">Reviews</span></a>
    <div style="height:1px;background:rgba(201,168,76,.08);margin:6px 14px;"></div>
    <a class="ni" href="lateh-luxe-dashboard.html"><span class="ni-ic" data-icon="return"></span><span class="ni-lb">Customer View</span></a>
  </nav>
  <div class="sb-foot"><button class="sb-signout" onclick="LL.signOut()"><span class="sb-so-ic" data-icon="sign-out"></span>Sign Out</button></div>
</aside>
<div class="sb-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <button class="tb-menu" onclick="toggleSidebar()"><span data-icon="menu"></span></button>
    <div class="tb-title"><div class="tb-heading">Orders</div><div class="tb-sub" id="orderCountLbl">Loading…</div></div>
    <div class="tb-actions"><div class="tb-av" id="tbAv">AD</div></div>
  </header>

  <div class="pg">
    <!-- KPI ROW -->
    <div class="kpi-row" style="margin-bottom:20px;">
      <div class="kpi"><div class="kpi-ic warn"><span data-icon="package"></span></div><div><div class="kpi-val" id="kPend">—</div><div class="kpi-lb">Pending</div></div></div>
      <div class="kpi"><div class="kpi-ic blue"><span data-icon="analytics"></span></div><div><div class="kpi-val" id="kProc">—</div><div class="kpi-lb">Processing</div></div></div>
      <div class="kpi"><div class="kpi-ic info"><span data-icon="truck"></span></div><div><div class="kpi-val" id="kShip">—</div><div class="kpi-lb">Shipped</div></div></div>
      <div class="kpi"><div class="kpi-ic green"><span data-icon="check"></span></div><div><div class="kpi-val" id="kDel">—</div><div class="kpi-lb">Delivered</div></div></div>
    </div>

    <div class="filter-bar">
      <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-inp" id="searchInp" placeholder="Search by order ID, customer name…" oninput="renderOrders()"/></div>
      <select class="filter-sel" id="statusFilter" onchange="renderOrders()">
        <option value="all">All Statuses</option>
        <option value="pending">Pending</option><option value="processing">Processing</option>
        <option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option>
      </select>
    </div>

    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="ordersTbody"><tr><td colspan="7"><div class="page-loader"><div class="spin"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-ov" id="orderModal">
  <div class="modal" style="max-width:560px;">
    <div class="modal-hd">
      <div class="modal-title" id="omTitle">Order Details</div>
      <button class="modal-close" onclick="closeOrderModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="omBody"></div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeOrderModal()">Close</button>
      <div style="display:flex;gap:8px;" id="omActions"></div>
    </div>
  </div>
</div>

<script>
let allOrders=[],currentOrder=null;

window.addEventListener('load',async()=>{
  LL.renderIcons();
  const auth=await LL.requireAuth('admin');
  if(!auth)return;
  LL.paintUser(auth.u);
  LL.watchAuth();
  await loadOrders();
});

async function loadOrders(){
  const{data}=await LL.db.from('orders').select('*').order('created_at',{ascending:false});
  allOrders=data||[];
  updateKPIs();renderOrders();
}

function updateKPIs(){
  ['pending','processing','shipped','delivered'].forEach((s,i)=>{
    const ids=['kPend','kProc','kShip','kDel'];
    LL.setTxt(ids[i],allOrders.filter(o=>o.status===s).length);
  });
  LL.setTxt('orderCountLbl',`${allOrders.length} total orders`);
}

function renderOrders(){
  const q=document.getElementById('searchInp').value.trim().toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  let orders=allOrders.filter(o=>{
    const mQ=!q||o.id.toLowerCase().includes(q)||(o.delivery_name||'').toLowerCase().includes(q)||(o.delivery_phone||'').includes(q);
    const mS=sf==='all'||o.status===sf;
    return mQ&&mS;
  });
  const tbody=document.getElementById('ordersTbody');
  if(!orders.length){tbody.innerHTML=`<tr><td colspan="7"><div class="empty" style="padding:24px;"><div class="empty-sub">No orders found.</div></div></td></tr>`;return;}
  tbody.innerHTML=orders.map(o=>{
    const items=Array.isArray(o.items)?o.items:[];
    const waMsg=`Hi! I'm reviewing your order #${o.id.slice(-6).toUpperCase()}. Can we discuss?`;
    return `<tr>
      <td><span style="font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);">#${o.id.slice(-6).toUpperCase()}</span></td>
      <td><div style="font-size:.78rem;color:var(--ivory-m);">${LL.esc(o.delivery_name||'—')}</div><div style="font-size:.64rem;color:var(--ivory-d);">${LL.esc(o.delivery_phone||'')}</div></td>
      <td style="font-size:.74rem;color:var(--ivory-d);">${items.length} item${items.length!==1?'s':''}</td>
      <td><span style="font-family:'Cinzel',serif;color:var(--gold);">₦${LL.fmt(o.total)}</span></td>
      <td style="font-size:.72rem;color:var(--ivory-d);">${LL.fmtDate(o.created_at)}</td>
      <td><span class="pill ${pillClass(o.status)}">${o.status}</span></td>
      <td><div style="display:flex;gap:5px;">
        <button class="btn btn-ghost btn-sm" onclick="viewOrder('${o.id}')"><span data-icon="eye"></span></button>
        <a class="btn btn-ghost btn-sm btn-wa" href="${LL.waLink(waMsg)}" target="_blank"><span data-icon="whatsapp"></span></a>
      </div></td>
    </tr>`;
  }).join('');
  LL.renderIcons();
}

function pillClass(s){const m={pending:'pill-pend',processing:'pill-proc',shipped:'pill-ship',delivered:'pill-ok',cancelled:'pill-cancel'};return m[s]||'pill-pend';}

function viewOrder(id){
  const o=allOrders.find(x=>x.id===id);if(!o)return;
  currentOrder=o;
  LL.setTxt('omTitle',`Order #${o.id.slice(-6).toUpperCase()}`);
  const items=Array.isArray(o.items)?o.items:[];
  const waMsg=`Hi ${o.delivery_name||'customer'}! Your Lateh Luxe order #${o.id.slice(-6).toUpperCase()} update:`;
  document.getElementById('omBody').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);">Customer</label>
          <p style="font-size:.78rem;color:var(--ivory-m);margin-top:4px;line-height:1.6;">${LL.esc(o.delivery_name||'—')}<br/>${LL.esc(o.delivery_phone||'')}</p></div>
        <div><label style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);">Delivery Address</label>
          <p style="font-size:.78rem;color:var(--ivory-m);margin-top:4px;line-height:1.6;">${LL.esc(o.delivery_address||'—')}<br/>${LL.esc(o.delivery_city||'')}${o.delivery_state?', '+LL.esc(o.delivery_state):''}</p></div>
      </div>
      <div>
        <label style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);display:block;margin-bottom:8px;">Items Ordered</label>
        ${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.76rem;"><span style="color:var(--ivory-m);">${LL.esc(i.name)} × ${i.qty||1}</span><span style="font-family:'Cinzel',serif;color:var(--gold);">₦${LL.fmt(i.price*(i.qty||1))}</span></div>`).join('')}
      </div>
      <div style="background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.1);border-radius:var(--r);padding:12px;font-size:.76rem;line-height:1.8;color:var(--ivory-d);">
        Delivery: ${o.delivery_fee?'₦'+LL.fmt(o.delivery_fee):'Free'} (${o.delivery_type||'standard'})<br/>
        ${o.discount?'Discount: -₦'+LL.fmt(o.discount)+'<br/>':''}
        ${o.delivery_note?'Note: '+LL.esc(o.delivery_note)+'<br/>':''}
        ${o.payment_ref?'Payment Ref: '+LL.esc(o.payment_ref)+'<br/>':''}
        <strong style="color:var(--gold);font-family:'Cinzel',serif;">Total: ₦${LL.fmt(o.total)}</strong>
      </div>
      <div><label style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);">Update Status</label>
        <select id="omStatus" style="margin-top:6px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.18);border-radius:var(--r);color:var(--ivory);padding:9px 12px;font-size:.8rem;outline:none;width:100%;">
          <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
          <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
        </select>
      </div>
    </div>`;
  document.getElementById('omActions').innerHTML=`
    <a class="btn btn-ghost btn-sm btn-wa" href="${LL.waLink(waMsg)}" target="_blank"><span data-icon="whatsapp"></span>WhatsApp Customer</a>
    <button class="btn btn-gold" onclick="updateOrderStatus()"><span data-icon="check"></span>Update Status</button>`;
  document.getElementById('orderModal').classList.add('show');
  LL.renderIcons();
}

function closeOrderModal(){document.getElementById('orderModal').classList.remove('show');currentOrder=null;}

async function updateOrderStatus(){
  if(!currentOrder)return;
  const newStatus=document.getElementById('omStatus').value;
  try{
    await LL.db.from('orders').update({status:newStatus,updated_at:new Date().toISOString()}).eq('id',currentOrder.id);
    const o=allOrders.find(x=>x.id===currentOrder.id);if(o)o.status=newStatus;
    closeOrderModal();updateKPIs();renderOrders();
    LL.toast('Order status updated to "'+newStatus+'"','success');
  }catch(_){LL.toast('Update failed','error');}
}
</script>
</body>
</html>
