<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wishlist — Lateh Luxe Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="ll-core.js"></script>
<link rel="stylesheet" href="ll-theme.css"/>
<style>
.wish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.wc{background:var(--deep3);border:1px solid rgba(201,168,76,.1);border-radius:var(--r2);overflow:hidden;transition:transform .2s,border-color .2s;}
.wc:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.22);}
.wc-img{height:155px;background:var(--deep4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.wc-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.wc-img svg{width:36px;height:36px;color:rgba(201,168,76,.3);}
.wc-rm{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(10,10,15,.75);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .18s;}
.wc:hover .wc-rm{opacity:1;}
.wc-rm:hover{background:rgba(212,89,106,.4);}
.wc-rm svg{width:11px;height:11px;color:var(--err);}
.wc-info{padding:13px;}
.wc-cat{font-size:.58rem;letter-spacing:.12em;color:var(--gold-d);text-transform:uppercase;margin-bottom:3px;}
.wc-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;color:var(--ivory);margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.wc-price{font-family:'Cinzel',serif;font-size:.84rem;color:var(--gold);}
.wc-foot{display:flex;gap:7px;padding:0 13px 13px;}
.wc-foot .btn{flex:1;padding:7px 8px;font-size:.6rem;}
.wl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.wl-total{font-size:.74rem;color:var(--ivory-d);}
.wl-total span{color:var(--gold);font-family:'Cinzel',serif;}
</style>
</head>
<body>
<div class="shell">
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo"><svg viewBox="0 0 32 32" fill="none"><rect x=".5" y=".5" width="31" height="31" stroke="#C9A84C" stroke-width=".7"/><rect x="4" y="4" width="24" height="24" stroke="#C9A84C" stroke-width=".3" stroke-dasharray="2 2"/><path d="M16 8l5 8-5 8-5-8z" stroke="#C9A84C" stroke-width=".8" fill="rgba(201,168,76,.15)"/><circle cx="16" cy="16" r="2" fill="#C9A84C"/></svg></div>
    <div><div class="sb-brand-name">Lateh <em>Luxe</em></div><div class="sb-brand-tag">Collections</div></div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sbAv">LL</div>
    <div class="sb-user-info"><div class="sb-name" id="sbName">Loading…</div><div class="sb-email" id="sbEmail"></div><div class="sb-tier" id="sbTier"></div></div>
  </div>
  <nav class="sb-nav">
    <a class="ni" href="lateh-luxe-dashboard.html"><span class="ni-ic" data-icon="dashboard"></span><span class="ni-lb">Dashboard</span></a>
    <a class="ni" href="lateh-luxe-browse.html"><span class="ni-ic" data-icon="browse"></span><span class="ni-lb">Browse Catalogue</span></a>
    <a class="ni" href="lateh-luxe-cart.html"><span class="ni-ic" data-icon="cart"></span><span class="ni-lb">My Cart</span><span class="nbadge" id="cartB" style="display:none"></span></a>
    <a class="ni on" href="lateh-luxe-wishlist.html"><span class="ni-ic" data-icon="wishlist"></span><span class="ni-lb">Wishlist</span><span class="nbadge" id="wlB" style="display:none"></span></a>
    <a class="ni" href="lateh-luxe-orders.html"><span class="ni-ic" data-icon="orders"></span><span class="ni-lb">My Orders</span></a>
    <a class="ni" href="lateh-luxe-notifications.html"><span class="ni-ic" data-icon="notifications"></span><span class="ni-lb">Notifications</span><span class="nbadge" id="notifB" style="display:none"></span></a>
    <a class="ni" href="lateh-luxe-support.html"><span class="ni-ic" data-icon="support"></span><span class="ni-lb">Support</span></a>
  </nav>
  <div class="sb-foot"><button class="sb-signout" onclick="LL.signOut()"><span class="sb-so-ic" data-icon="sign-out"></span>Sign Out</button></div>
</aside>
<div class="sb-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <button class="tb-menu" onclick="toggleSidebar()"><span data-icon="menu"></span></button>
    <div class="tb-title"><div class="tb-heading">Wishlist</div></div>
    <div class="tb-actions">
      <button class="tb-ic" onclick="location.href='lateh-luxe-cart.html'"><span data-icon="cart"></span><span class="tb-dot" id="cDot" style="display:none"></span></button>
      <button class="tb-ic" onclick="location.href='lateh-luxe-notifications.html'"><span data-icon="notifications"></span><span class="tb-dot" id="nDot" style="display:none"></span></button>
      <div class="tb-av" id="tbAv">LL</div>
    </div>
  </header>

  <div class="pg">
    <div class="wl-header">
      <div><div class="sec-title">My <em>Wishlist</em></div><div class="sec-sub">Items you've saved for later</div></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="wl-total">Total value: <span id="wlTotal">₦0</span></div>
        <button class="btn btn-gold btn-sm" id="addAllBtn" onclick="addAllToCart()" style="display:none;"><span data-icon="cart"></span>Add All to Cart</button>
        <button class="btn btn-ghost btn-sm" id="clearBtn" onclick="clearWishlist()" style="display:none;"><span data-icon="trash"></span>Clear All</button>
      </div>
    </div>
    <div id="wishlistWrap"></div>
  </div>
</div>
</div>

<script>
window.addEventListener('load',async()=>{
  LL.renderIcons();
  const auth=await LL.requireAuth('customer');
  if(!auth)return;
  LL.paintUser(auth.u);
  LL.watchAuth();
  renderWishlist();
});

function renderWishlist(){
  const wl=LL.getLocal('ll_wishlist')||[];
  const wrap=document.getElementById('wishlistWrap');
  const addBtn=document.getElementById('addAllBtn');
  const clrBtn=document.getElementById('clearBtn');

  if(!wl.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-ic"><span data-icon="wishlist"></span></div><div class="empty-title">Your wishlist is empty</div><div class="empty-sub">Browse our catalogue and save items you love.</div><button class="btn btn-gold" onclick="location.href='lateh-luxe-browse.html'"><span data-icon="browse"></span>Browse Catalogue</button></div>`;
    addBtn.style.display='none';clrBtn.style.display='none';
    LL.setTxt('wlTotal','₦0');LL.renderIcons();return;
  }

  const total=wl.reduce((s,i)=>s+i.price,0);
  LL.setTxt('wlTotal','₦'+LL.fmt(total));
  addBtn.style.display='';clrBtn.style.display='';

  // Update sidebar badge
  const wlBadge=document.getElementById('wlB');
  if(wlBadge){wlBadge.textContent=wl.length;wlBadge.style.display=wl.length?'':'none';}

  wrap.innerHTML=`<div class="wish-grid">${wl.map(item=>`
    <div class="wc">
      <div class="wc-img">
        ${item.image?`<img src="${LL.esc(item.image)}" alt="${LL.esc(item.name)}" loading="lazy"/>`:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>'}
        <button class="wc-rm" onclick="removeItem('${LL.esc(item.id)}')" title="Remove from wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="wc-info">
        <div class="wc-cat">${LL.esc(item.category||'Gift')}</div>
        <div class="wc-name">${LL.esc(item.name)}</div>
        <div class="wc-price">₦${LL.fmt(item.price)}</div>
      </div>
      <div class="wc-foot">
        <button class="btn btn-outline" onclick="removeItem('${LL.esc(item.id)}')"><span data-icon="x"></span></button>
        <button class="btn btn-gold" onclick="moveToCart('${LL.esc(item.id)}')"><span data-icon="cart"></span>Add to Cart</button>
      </div>
    </div>`).join('')}</div>`;
  LL.renderIcons();
}

function removeItem(id){
  let wl=(LL.getLocal('ll_wishlist')||[]).filter(i=>i.id!==id);
  LL.setLocal('ll_wishlist',wl);renderWishlist();LL.toast('Removed from wishlist','info');
}

function moveToCart(id){
  const wl=LL.getLocal('ll_wishlist')||[];
  const item=wl.find(i=>i.id===id);
  if(!item)return;
  const cart=LL.getCart();
  const ex=cart.find(c=>c.id===id);
  if(ex)ex.qty=(ex.qty||1)+1;else cart.push({...item,qty:1});
  LL.saveCart(cart);LL.syncBadges();
  removeItem(id);
  LL.toast(`${item.name} moved to cart!`,'success');
}

function addAllToCart(){
  const wl=LL.getLocal('ll_wishlist')||[];
  if(!wl.length)return;
  const cart=LL.getCart();
  wl.forEach(item=>{const ex=cart.find(c=>c.id===item.id);if(ex)ex.qty=(ex.qty||1)+1;else cart.push({...item,qty:1});});
  LL.saveCart(cart);LL.setLocal('ll_wishlist',[]);LL.syncBadges();
  LL.toast('All wishlist items added to cart!','success');
  setTimeout(()=>location.href='lateh-luxe-cart.html',900);
}

function clearWishlist(){
  if(!confirm('Clear your entire wishlist?'))return;
  LL.setLocal('ll_wishlist',[]);renderWishlist();LL.toast('Wishlist cleared','info');
}
</script>
</body>
</html>
